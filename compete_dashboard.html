<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compete Eval — Mindtrip vs Wanderboat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3150;
    --mindtrip: #4f8ef7;
    --wanderboat: #f97316;
    --tie: #a78bfa;
    --text: #e2e8f0;
    --muted: #7c84a0;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.6; }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
  header { margin-bottom: 36px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  header .subtitle { color: var(--muted); margin-top: 4px; font-size: 13px; }
  .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .tag-mindtrip { background: rgba(79,142,247,.15); color: var(--mindtrip); }
  .tag-wanderboat { background: rgba(249,115,22,.15); color: var(--wanderboat); }
  .tag-tie { background: rgba(167,139,250,.15); color: var(--tie); }
  .tag-match { background: rgba(34,197,94,.12); color: var(--green); }
  .tag-mismatch { background: rgba(239,68,68,.12); color: var(--red); }

  /* Run Eval form */
  .run-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 32px; }
  .run-form h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .run-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .run-row input[type=text] { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 14px; outline: none; }
  .run-row input[type=text]:focus { border-color: var(--mindtrip); }
  .run-row select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 14px; outline: none; cursor: pointer; }
  .run-row button { background: var(--mindtrip); color: #fff; border: none; border-radius: 8px; padding: 9px 22px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .run-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  #run-status { margin-top: 10px; font-size: 13px; color: var(--muted); min-height: 20px; }
  #run-status.ok { color: var(--green); }
  #run-status.err { color: var(--red); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--mindtrip); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Summary cards */
  .cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
  .card .value { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card.mindtrip .value { color: var(--mindtrip); }
  .card.wanderboat .value { color: var(--wanderboat); }
  .card.tie .value { color: var(--tie); }
  .card.overall .value { color: var(--text); }

  /* Score bar */
  .scorebar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 32px; }
  .scorebar-wrap h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .scorebar { display: flex; height: 36px; border-radius: 8px; overflow: hidden; }
  .scorebar-mindtrip { background: var(--mindtrip); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; transition: width .4s; }
  .scorebar-tie { background: var(--tie); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; transition: width .4s; }
  .scorebar-wanderboat { background: var(--wanderboat); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; transition: width .4s; }
  .scorebar-legend { display:flex; gap:20px; margin-top:12px; font-size:12px; color:var(--muted); flex-wrap: wrap; }
  .scorebar-legend span { display:flex; align-items:center; gap:6px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* Bucket breakdown */
  .buckets { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 32px; }
  .bucket { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .bucket h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .bucket-bars { display:flex; flex-direction:column; gap:6px; }
  .bucket-row { display:flex; align-items:center; gap:8px; font-size:12px; }
  .bucket-row .name { width: 80px; color: var(--muted); }
  .bucket-bar-outer { flex:1; background:var(--surface2); border-radius:4px; height:8px; }
  .bucket-bar-inner { height:8px; border-radius:4px; transition: width .4s; }
  .bucket-row .count { width:16px; text-align:right; font-weight:600; font-size:11px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 14px 16px; vertical-align: top; }
  td.id { font-weight: 700; font-size: 13px; color: var(--muted); width: 48px; }
  td.prompt { font-size: 13px; color: var(--text); max-width: 240px; }

  /* Score bar mini */
  .mini-bars { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
  .mini-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .mini-label { color: var(--muted); width: 80px; }
  .mini-outer { flex: 1; background: var(--surface2); border-radius: 3px; height: 6px; }
  .mini-inner { height: 6px; border-radius: 3px; }
  .mini-val { color: var(--muted); font-size: 10px; width: 28px; text-align: right; }

  /* Detail drawer */
  .detail-row { display: none; }
  .detail-row td { padding: 0 16px 16px 16px; }
  .detail-box { background: var(--surface2); border-radius: 8px; padding: 14px 16px; border-left: 3px solid var(--border); }
  .detail-box .det-head { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; font-weight: 600; }
  .detail-box .det-body { font-size: 12px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
  .detail-box .det-footer { margin-top: 10px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; }
  .response-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
  .response-col h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .response-col .resp-text { font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; max-height: 280px; overflow-y: auto; background: var(--bg); border-radius: 6px; padding: 10px 12px; border: 1px solid var(--border); }
  .response-col .resp-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
  .empty-state strong { display: block; font-size: 16px; color: var(--text); margin-bottom: 8px; }

  @media (max-width: 900px) {
    .cards { grid-template-columns: repeat(2,1fr); }
    .buckets { grid-template-columns: repeat(2,1fr); }
    .response-cols { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <h1>Compete Eval — Mindtrip vs Wanderboat</h1>
      <div class="subtitle" id="subtitle">Loading results...</div>
    </div>
    <a href="/login" style="font-size:12px;color:var(--muted);text-decoration:none;padding-top:4px">⚙ Login setup</a>
  </header>

  <!-- Run Eval form -->
  <div class="run-form">
    <h2>Run New Eval</h2>
    <div class="run-row">
      <input type="text" id="promptInput" placeholder="Enter a travel prompt…" />
      <select id="bucketSelect">
        <option value="">— bucket (optional) —</option>
        <option value="transactional">Transactional</option>
        <option value="itinerary">Itinerary</option>
        <option value="personalized">Personalized</option>
        <option value="live_data">Live Data</option>
        <option value="edge_case">Edge Case</option>
      </select>
      <button id="runBtn" onclick="runEval()">Run Eval</button>
    </div>
    <div id="run-status"></div>
  </div>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card overall">
      <div class="label">Battle Score</div>
      <div class="value" id="stat-pct">—</div>
      <div class="sub" id="stat-overall">Loading…</div>
    </div>
    <div class="card mindtrip">
      <div class="label">Mindtrip Wins</div>
      <div class="value" id="stat-mt">—</div>
      <div class="sub" id="stat-mt-sub"></div>
    </div>
    <div class="card wanderboat">
      <div class="label">Wanderboat Wins</div>
      <div class="value" id="stat-wb">—</div>
      <div class="sub" id="stat-wb-sub"></div>
    </div>
    <div class="card tie">
      <div class="label">Ties</div>
      <div class="value" id="stat-tie">—</div>
      <div class="sub" id="stat-tie-sub"></div>
    </div>
  </div>

  <!-- Score bar -->
  <div class="scorebar-wrap">
    <h2>Overall Distribution</h2>
    <div class="scorebar">
      <div class="scorebar-mindtrip" id="bar-mt" style="width:0%"></div>
      <div class="scorebar-wanderboat" id="bar-wb" style="width:0%"></div>
      <div class="scorebar-tie" id="bar-tie" style="width:0%"></div>
    </div>
    <div class="scorebar-legend">
      <span><i class="dot" style="background:var(--mindtrip)"></i> <span id="legend-mt">Mindtrip</span></span>
      <span><i class="dot" style="background:var(--wanderboat)"></i> <span id="legend-wb">Wanderboat</span></span>
      <span><i class="dot" style="background:var(--tie)"></i> <span id="legend-tie">Ties</span></span>
    </div>
  </div>

  <!-- Bucket breakdown -->
  <div class="buckets" id="buckets-wrap"></div>

  <!-- Per-prompt table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Prompt</th>
          <th>Bucket</th>
          <th>Verdict</th>
          <th>Scores</th>
          <th>Duration</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>

</div>

<script>
let _evals = [];

// ── Utilities ─────────────────────────────────────────────────────────────

function winnerTag(v) {
  if (v === 'mindtrip') return `<span class="tag tag-mindtrip">Mindtrip</span>`;
  if (v === 'wanderboat') return `<span class="tag tag-wanderboat">Wanderboat</span>`;
  if (v === 'tie') return `<span class="tag tag-tie">Tie</span>`;
  return `<span class="tag" style="background:rgba(100,100,200,.1);color:var(--muted)">—</span>`;
}

function fmtDur(ms) {
  if (!ms) return '—';
  return ms >= 60000 ? `${(ms/60000).toFixed(1)}m` : `${(ms/1000).toFixed(1)}s`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function scoreBar(mt, wb) {
  if (mt == null && wb == null) return '<span style="color:var(--muted);font-size:11px">no scores</span>';
  const mtv = mt != null ? mt.toFixed(2) : '—';
  const wbv = wb != null ? wb.toFixed(2) : '—';
  const diff = (mt != null && wb != null) ? (mt - wb) : null;
  const sign = diff != null && diff > 0 ? '+' : '';
  return `<span style="color:var(--mindtrip);font-weight:700">${mtv}</span>
    <span style="color:var(--muted)"> vs </span>
    <span style="color:var(--wanderboat);font-weight:700">${wbv}</span>
    ${diff != null ? `<span style="color:var(--muted);font-size:11px;margin-left:4px">(Δ ${sign}${diff.toFixed(2)})</span>` : ''}`;
}

function parseJudgeData(row) {
  // reasoning is stored as JSON with axes breakdown; fall back to flat values
  try {
    const d = JSON.parse(row.judge_reasoning);
    if (d && d.axes) return d;
  } catch {}
  return null;
}

function miniAxis(label, mt, wb) {
  const max = 5;
  const mtp = mt != null ? (mt/max*100).toFixed(0) : 0;
  const wbp = wb != null ? (wb/max*100).toFixed(0) : 0;
  return `<div class="mini-row">
    <span class="mini-label">${label}</span>
    <div style="flex:1;display:flex;flex-direction:column;gap:2px">
      <div class="mini-outer"><div class="mini-inner" style="width:${mtp}%;background:var(--mindtrip)"></div></div>
      <div class="mini-outer"><div class="mini-inner" style="width:${wbp}%;background:var(--wanderboat)"></div></div>
    </div>
    <span class="mini-val" style="color:var(--mindtrip)">${mt ?? '—'}</span>
    <span class="mini-val" style="color:var(--wanderboat)">${wb ?? '—'}</span>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────

function renderSummary(data) {
  const total = data.length;
  const mt = data.filter(e => e.winner === 'mindtrip').length;
  const wb = data.filter(e => e.winner === 'wanderboat').length;
  const tie = data.filter(e => e.winner === 'tie').length;
  const pct = total > 0 ? ((mt / total) * 100).toFixed(1) : '0';

  document.getElementById('subtitle').textContent =
    `${total} eval${total !== 1 ? 's' : ''} · LLM-as-judge via autoevals Battle`;

  document.getElementById('stat-pct').textContent = `${pct}%`;
  document.getElementById('stat-overall').textContent = `Mindtrip advantage (${mt}/${total})`;
  document.getElementById('stat-mt').textContent = mt;
  document.getElementById('stat-wb').textContent = wb;
  document.getElementById('stat-tie').textContent = tie;

  // Score bar
  const mtPct = total > 0 ? (mt / total * 100).toFixed(1) : 0;
  const wbPct = total > 0 ? (wb / total * 100).toFixed(1) : 0;
  const tiePct = total > 0 ? (tie / total * 100).toFixed(1) : 0;
  document.getElementById('bar-mt').style.width = mtPct + '%';
  document.getElementById('bar-mt').textContent = mt > 0 ? `Mindtrip ${mtPct}%` : '';
  document.getElementById('bar-wb').style.width = wbPct + '%';
  document.getElementById('bar-wb').textContent = wb > 0 ? `WB ${wbPct}%` : '';
  document.getElementById('bar-tie').style.width = tiePct + '%';
  document.getElementById('bar-tie').textContent = tie > 0 ? `Tie ${tiePct}%` : '';
  document.getElementById('legend-mt').textContent = `Mindtrip wins (${mt})`;
  document.getElementById('legend-wb').textContent = `Wanderboat wins (${wb})`;
  document.getElementById('legend-tie').textContent = `Ties (${tie})`;

  // Bucket breakdown
  const BUCKETS = ['transactional', 'itinerary', 'personalized', 'live_data', 'edge_case'];
  const LABELS  = ['Transactional', 'Itinerary', 'Personalized', 'Live Data', 'Edge Cases'];
  const bucketsEl = document.getElementById('buckets-wrap');
  bucketsEl.innerHTML = BUCKETS.map((b, i) => {
    const rows = data.filter(e => e.bucket === b);
    const bmt = rows.filter(e => e.winner === 'mindtrip').length;
    const bwb = rows.filter(e => e.winner === 'wanderboat').length;
    const btie = rows.filter(e => e.winner === 'tie').length;
    const bmax = Math.max(bmt, bwb, btie, 1);
    return `<div class="bucket">
      <h3>${LABELS[i]}${rows.length > 0 ? ` <span style="color:var(--muted);font-weight:400">(${rows.length})</span>` : ''}</h3>
      <div class="bucket-bars">
        <div class="bucket-row">
          <span class="name" style="color:var(--mindtrip)">Mindtrip</span>
          <div class="bucket-bar-outer"><div class="bucket-bar-inner" style="width:${bmt/bmax*100}%;background:var(--mindtrip)"></div></div>
          <span class="count" style="color:var(--mindtrip)">${bmt}</span>
        </div>
        <div class="bucket-row">
          <span class="name" style="color:var(--wanderboat)">Wanderboat</span>
          <div class="bucket-bar-outer"><div class="bucket-bar-inner" style="width:${bwb/bmax*100}%;background:var(--wanderboat)"></div></div>
          <span class="count" style="color:var(--wanderboat)">${bwb}</span>
        </div>
        <div class="bucket-row">
          <span class="name" style="color:var(--tie)">Tie</span>
          <div class="bucket-bar-outer"><div class="bucket-bar-inner" style="width:${btie/bmax*100}%;background:var(--tie)"></div></div>
          <span class="count" style="color:var(--tie)">${btie}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTable(data) {
  const tbody = document.getElementById('results-body');
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <strong>No evals yet</strong>
        Enter a prompt above and click Run Eval to get started.
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  data.forEach((row, i) => {
    const mtDur = fmtDur(row.mindtrip_duration_ms);
    const wbDur = fmtDur(row.wanderboat_duration_ms);

    const mainTr = document.createElement('tr');
    mainTr.innerHTML = `
      <td class="id">#${row.id}</td>
      <td class="prompt">${escHtml(row.prompt)}</td>
      <td><span class="tag" style="background:rgba(100,100,200,.1);color:var(--muted)">${row.bucket || '—'}</span></td>
      <td>${winnerTag(row.winner)}</td>
      <td style="white-space:nowrap">${scoreBar(row.score_mindtrip, row.score_wanderboat)}</td>
      <td style="font-size:12px;color:var(--muted)">
        <span style="color:var(--mindtrip)">MT ${mtDur}</span><br>
        <span style="color:var(--wanderboat)">WB ${wbDur}</span>
      </td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(row.created_at)}</td>
    `;

    const detTr = document.createElement('tr');
    detTr.className = 'detail-row';
    const mtResp = row.mindtrip_response || row.mindtrip_error || '(no response)';
    const wbResp = row.wanderboat_response || row.wanderboat_error || '(no response)';
    const jd = parseJudgeData(row);
    const axesHtml = jd ? `
      <div style="margin-bottom:14px">
        <div class="det-head" style="margin-bottom:8px">Rubric Scores (MT blue · WB orange)</div>
        <div class="mini-bars" style="max-width:380px">
          ${miniAxis('Actionability', jd.axes?.actionability?.mindtrip, jd.axes?.actionability?.wanderboat)}
          ${miniAxis('Specificity',   jd.axes?.specificity?.mindtrip,   jd.axes?.specificity?.wanderboat)}
          ${miniAxis('Personalization', jd.axes?.personalization?.mindtrip, jd.axes?.personalization?.wanderboat)}
          ${miniAxis('Trustworthiness', jd.axes?.trustworthiness?.mindtrip, jd.axes?.trustworthiness?.wanderboat)}
        </div>
      </div>` : '';
    const reasoningText = jd ? jd.summary : (row.judge_reasoning || '—');
    detTr.innerHTML = `
      <td colspan="7">
        <div class="detail-box">
          <div class="response-cols">
            <div class="response-col">
              <h4 style="color:var(--mindtrip)">Mindtrip</h4>
              <div class="resp-text">${escHtml(mtResp)}</div>
              <div class="resp-meta">Duration: ${mtDur}</div>
            </div>
            <div class="response-col">
              <h4 style="color:var(--wanderboat)">Wanderboat</h4>
              <div class="resp-text">${escHtml(wbResp)}</div>
              <div class="resp-meta">Duration: ${wbDur}</div>
            </div>
          </div>
          ${axesHtml}
          <div class="det-head">Judge Reasoning</div>
          <div class="det-body">${escHtml(reasoningText)}</div>
          <div class="det-footer">Axes weighted: Actionability 0.30 · Specificity 0.25 · Personalization 0.25 · Trustworthiness 0.20</div>
        </div>
      </td>
    `;

    tbody.appendChild(mainTr);
    tbody.appendChild(detTr);

    mainTr.addEventListener('click', () => {
      const open = detTr.style.display === 'table-row';
      detTr.style.display = open ? 'none' : 'table-row';
    });
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function render(data) {
  _evals = data;
  renderSummary(data);
  renderTable(data);
}

// ── Data loading ──────────────────────────────────────────────────────────

async function loadEvals() {
  try {
    const res = await fetch('/api/evals?limit=100');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('subtitle').textContent = 'Could not reach API — open via `uvicorn scraper.streaming.ws_server:app --port 8765`';
    render([]);
  }
}

// ── Run new eval ──────────────────────────────────────────────────────────

function setStatus(msg, cls = '') {
  const el = document.getElementById('run-status');
  el.innerHTML = msg;
  el.className = cls;
}

async function runEval() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { setStatus('Enter a prompt first.', 'err'); return; }
  const bucket = document.getElementById('bucketSelect').value || null;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Launching scrapers — this takes ~2 min…');

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, bucket }),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let lastEvent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      // SSE frames are separated by blank lines
      const frames = buf.split('\n\n');
      buf = frames.pop(); // keep incomplete last frame

      for (const frame of frames) {
        let event = '';
        let data = '';
        for (const line of frame.split('\n')) {
          if (line.startsWith('event: ')) event = line.slice(7).trim();
          if (line.startsWith('data: '))  data  = line.slice(6).trim();
        }
        if (event === 'status') {
          try { const d = JSON.parse(data); setStatus(`<span class="spinner"></span>${d.message}`); } catch {}
        } else if (event === 'done') {
          setStatus('Done! Refreshing results…', 'ok');
          await loadEvals();
          document.getElementById('promptInput').value = '';
        } else if (event === 'error') {
          try { const d = JSON.parse(data); setStatus(`Error: ${d.message}`, 'err'); } catch {
            setStatus('Unknown error', 'err');
          }
        }
      }
    }
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────

loadEvals();
// Refresh every 30s in case another process is running evals
setInterval(loadEvals, 30000);
</script>
